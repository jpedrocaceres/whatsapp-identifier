<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Identifier</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="header-icon">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>WA Identifier</h1>
        <p>Identifique suas mensagens</p>
      </div>
    </div>

    <!-- Content -->
    <div class="content">

      <!-- Name input -->
      <div class="field-group">
        <label for="username">
          <svg class="field-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
          </svg>
          Nome identificador
        </label>
        <div class="input-wrapper">
          <input
            type="text"
            id="username"
            placeholder="Ex: João Pedro"
            maxlength="30"
            autocomplete="off"
          />
          <span class="char-count" id="charCount">0/30</span>
        </div>
      </div>

      <!-- Toggle -->
      <div class="toggle-card">
        <div class="toggle-info">
          <span class="toggle-title">Identificador</span>
          <span class="toggle-subtitle" id="toggleSubtitle">Ativo</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="toggleActive" checked aria-label="Ativar identificador">
          <span class="slider"></span>
        </label>
      </div>

      <!-- Preview -->
      <div class="preview-section">
        <div class="preview-header">
          <svg class="preview-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
          </svg>
          <span class="preview-label">Preview da mensagem</span>
        </div>
        <div class="chat-bubble-wrap" id="chatBubbleWrap">
          <div class="chat-bubble">
            <span id="previewText" class="preview-text">*Nome:* &#10;Sua mensagem aqui...</span>
            <span class="bubble-tail"></span>
            <span class="bubble-time">agora ✓✓</span>
          </div>
        </div>
      </div>

      <!-- Privacy Blur Section -->
      <div class="section-divider">
        <span class="divider-text">Privacidade</span>
      </div>

      <!-- Privacy Toggle -->
      <div class="toggle-card">
        <div class="toggle-info">
          <span class="toggle-title">Blur de privacidade</span>
          <span class="toggle-subtitle" id="privacySubtitle">Inativo</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="togglePrivacy" aria-label="Ativar blur de privacidade">
          <span class="slider"></span>
        </label>
      </div>

      <!-- Blur Intensity -->
      <div class="field-group" id="blurSettings">
        <label>
          <svg class="field-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
          </svg>
          Intensidade do blur: <span id="blurValue">8</span>px
        </label>
        <input type="range" id="blurIntensity" min="2" max="20" value="8" class="range-slider" aria-label="Intensidade do blur">
      </div>

      <!-- Save -->
      <button id="saveBtn" type="button" class="save-btn">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V7l-4-4zm-5 16a3 3 0 110-6 3 3 0 010 6zm3-10H5V5h10v4z"/>
        </svg>
        Salvar configuração
      </button>

      <div id="status" class="status hidden"></div>
    </div>

    <div class="footer">v7.1 · WhatsApp Web</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
